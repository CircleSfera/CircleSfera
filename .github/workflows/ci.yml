name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./circlesfera-backend

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./circlesfera-backend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Test
      run: npm test
      env:
        CI: true

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./circlesfera-frontend

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./circlesfera-frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Test
      run: npm test
      env:
        CI: true

  landing:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./circlesfera-landing

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./circlesfera-landing/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend, landing]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Services
      run: docker compose -f docker-compose.yml build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Start Services
      run: |
        docker compose -f docker-compose.yml up -d postgres redis
        # Let postgres wake up
        sleep 5
      env:
        POSTGRES_USER: test
        POSTGRES_PASSWORD: test
        POSTGRES_DB: circlesfera
        DB_PORT: 5432
        REDIS_PORT: 6379

    - name: Prepare Backend
      run: |
        cd circlesfera-backend
        npm ci
        npx prisma generate
        npx prisma db push --accept-data-loss
        npm run dev &
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/circlesfera
        JWT_SECRET: extremely-long-and-secure-jwt-secret-for-testing-purposes-only-123456
        JWT_REFRESH_SECRET: extremely-long-and-secure-jwt-refresh-secret-for-testing-purposes-only-123456
        CSRF_SECRET: extremely-long-and-secure-csrf-secret-for-testing-purposes-only-123456
        REDIS_HOST: localhost
        REDIS_PORT: 6379

    - name: Prepare Frontend
      run: |
        cd circlesfera-frontend
        npm ci
        npm run dev &

    - name: Run E2E Tests
      run: npx playwright test e2e/happy-path.spec.ts
      env:
        VITE_API_URL: http://localhost:3000

    - name: Stop Services
      if: always()
      run: docker compose down
