name: Deploy to OVH VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: circlesfera/circlesfera
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  test:
    name: Run Lint and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Monorepo Dependencies
        run: npm install

      - name: "Backend: Install, Lint and Test"
        run: |
          cd circlesfera-backend
          npm install
          npx prisma generate
          npm run lint
          npm run test

      - name: "Frontend: Install and Lint"
        run: |
          cd circlesfera-frontend
          npm install
          npm run lint

  build:
    name: Build and Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./circlesfera-backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./circlesfera-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Deployment
        uses: appleboy/ssh-action@v1.2.5
        env:
          ENV_PRODUCTION_B64: ${{ secrets.ENV_PRODUCTION_B64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_PRODUCTION_B64
          script: |
            set -e
            echo "Starting deployment on OVH VPS..."

            # Navigate to project directory
            cd /srv/circlesfera

            # Login to GHCR on the VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest code (for docker-compose.prod.yml and nginx config)
            git fetch origin
            git reset --hard origin/main

            # Write secrets AFTER reset so they are never affected by checkout.
            # Compose interpolates ${VAR} from the project `.env` file by default;
            # service `env_file:` does NOT feed interpolation.
            if [ -n "$ENV_PRODUCTION_B64" ]; then
              echo "$ENV_PRODUCTION_B64" | base64 -d > .env.production
              echo "✅ .env.production written from secret."
            else
              echo "⚠️  WARNING: ENV_PRODUCTION_B64 secret not set. Using existing .env.production."
            fi

            if [ ! -f .env.production ]; then
              echo "❌ .env.production is missing."
              exit 1
            fi
            if ! grep -q '^REDIS_PASSWORD=.\+' .env.production; then
              echo "❌ REDIS_PASSWORD is missing/empty in .env.production (required for compose interpolation)."
              exit 1
            fi

            # Ensure default Compose env file exists for ${REDIS_PASSWORD} / ${POSTGRES_*} interpolation
            cp .env.production .env

            # Extract the deployment webhook directly from the .env file to bypass IDE schema warnings
            DEPLOY_WEBHOOK=$(grep '^SLACK_WEBHOOK_DEPLOYMENTS=' .env.production | cut -d '=' -f2- || echo "")

            export REGISTRY=ghcr.io/circlesfera/circlesfera

            # Pull latest images
            docker compose -f docker-compose.prod.yml --env-file .env.production pull

            # Restart stack; backend command runs `prisma migrate deploy` then starts the app.
            # --remove-orphans drops deprecated containers (e.g. CircleSfera-Landing) holding the network.
            docker compose -f docker-compose.prod.yml --env-file .env.production down --remove-orphans
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            # Poll backend health (migrate + Nest boot can take >20s)
            echo "Waiting for backend to become healthy..."
            HEALTH="starting"
            STATUS="missing"
            for i in $(seq 1 36); do
              STATUS=$(docker inspect --format='{{.State.Status}}' CircleSfera-Backend 2>/dev/null || echo "missing")
              HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' CircleSfera-Backend 2>/dev/null || echo "none")
              echo "  attempt $i/36 — status=$STATUS health=$HEALTH"
              if [ "$STATUS" = "running" ] && [ "$HEALTH" = "healthy" ]; then
                break
              fi
              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ] || [ "$STATUS" = "missing" ]; then
                break
              fi
              sleep 5
            done

            echo "--- Backend status: $STATUS | health: $HEALTH ---"
            echo "--- Last backend logs: ---"
            docker logs CircleSfera-Backend --tail=80 2>&1 || true
            echo "--- End logs ---"

            if [ "$STATUS" != "running" ] || [ "$HEALTH" != "healthy" ]; then
              echo "❌ Backend is not healthy (status=$STATUS, health=$HEALTH). Deploy FAILED."
              if [ -n "$DEPLOY_WEBHOOK" ]; then
                curl -X POST -H 'Content-type: application/json' --data '{"text":"🚨 *Deployment FAILED* to OVH VPS. Backend is not healthy."}' "$DEPLOY_WEBHOOK" || true
              fi
              exit 1
            fi

            echo "✅ Backend is healthy."

            # Clean up dangling images
            docker system prune -f

            echo "✅ Deployment completed successfully!"
            if [ -n "$DEPLOY_WEBHOOK" ]; then
              curl -X POST -H 'Content-type: application/json' --data '{"text":"✅ *Deployment SUCCESS* to OVH VPS. All containers running."}' "$DEPLOY_WEBHOOK" || true
            fi
