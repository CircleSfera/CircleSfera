name: Deploy to OVH VPS

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: circlesfera/circlesfera
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Lint and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm install

      - name: "Backend: Install, Lint and Test"
        run: |
          cd circlesfera-backend
          npm install
          npx prisma generate
          npm run lint
          npm run test

      - name: "Frontend: Install and Lint"
        run: |
          cd circlesfera-frontend
          npm install
          npm run lint

  build:
    name: Build and Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./circlesfera-backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./circlesfera-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Build and push Landing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./circlesfera-landing/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/landing:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Execute Remote SSH Deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          echo "Starting deployment on OVH VPS..."
          
          # Navigate to project directory
          cd /srv/circlesfera
          
          # Login to GHCR on the VPS
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull latest code (for docker-compose.prod.yml and migrations)
          git fetch origin
          git reset --hard origin/main
          
          # Pull latest images
          REGISTRY=ghcr.io/circlesfera/circlesfera docker compose -f docker-compose.prod.yml pull
          
          # Restart containers
          REGISTRY=ghcr.io/circlesfera/circlesfera docker compose -f docker-compose.prod.yml up -d
          
          # Run database migrations
          echo "Running database migrations..."
          docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
          
          # Clean up dangling images
          docker system prune -f
          
          echo "Deployment completed successfully!"
