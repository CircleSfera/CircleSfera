# Fetch backend logs from production VPS (manual or after a successful deploy).
name: Fetch Production Logs

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy to OVH VPS"]
    types: [completed]
    branches: [main]

jobs:
  fetch-logs:
    name: Fetch Backend Logs
    runs-on: ubuntu-latest
    # On workflow_run, only fetch after a successful deploy (skip cancelled/failed races).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Fetch Backend Logs
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "--- CircleSfera-Backend (tail 200) ---"
            docker logs --tail 200 CircleSfera-Backend 2>&1 || true
            echo "--- health ---"
            docker inspect --format='status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' CircleSfera-Backend 2>&1 || true
