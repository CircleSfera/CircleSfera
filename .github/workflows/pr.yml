name: Pull Request CI

on:
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  test:
    name: Run Lint and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm install

      - name: "Shared: Install and Build"
        run: |
          cd circlesfera-shared
          npm install
          npm run build

      - name: "Backend: Install, Lint and Test"
        run: |
          cd circlesfera-backend
          npm install
          npx prisma generate
          npm run lint
          npm run test

      - name: "Frontend: Install, Lint, Test and Build"
        run: |
          cd circlesfera-frontend
          npm install
          npm run lint
          npm run test
          npm run build
