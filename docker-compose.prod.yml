# Global logging configuration to prevent disk exhaustion
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  nginx-proxy:
    <<: *default-logging
    image: nginx:alpine
    container_name: CircleSfera-Proxy
    ports:
      - "8082:80"
    environment:
      - FRONTEND_PORT=80
      - BACKEND_PORT=3000
      - LANDING_PORT=80
    volumes:
      - ./nginx/master.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - landing
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - circlesfera-network

  postgres:
    <<: *default-logging
    image: pgvector/pgvector:pg16
    container_name: CircleSfera-Postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circlesfera-network

  redis:
    <<: *default-logging
    image: redis:7-alpine
    container_name: CircleSfera-Redis
    restart: unless-stopped
    networks:
      - circlesfera-network

  backend:
    <<: *default-logging
    image: ${REGISTRY:-ghcr.io/circlesfera/circlesfera}/backend:latest
    container_name: CircleSfera-Backend
    env_file:
      - path: ./.env.production
        required: false
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # DATABASE_URL hardcoded so Prisma works even if .env.production is missing on VPS
      - DATABASE_URL=postgresql://CircleSfera:Amazonico1198@postgres:5432/CircleSfera?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"
    restart: unless-stopped
    networks:
      - circlesfera-network

  landing:
    <<: *default-logging
    image: ${REGISTRY:-ghcr.io/circlesfera/circlesfera}/landing:latest
    container_name: CircleSfera-Landing
    networks:
      - circlesfera-network

  frontend:
    <<: *default-logging
    image: ${REGISTRY:-ghcr.io/circlesfera/circlesfera}/frontend:latest
    container_name: CircleSfera-Frontend
    restart: unless-stopped
    networks:
      - circlesfera-network

volumes:
  postgres_data:
  redis_data:

networks:
  circlesfera-network:
    driver: bridge
