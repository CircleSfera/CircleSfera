# Global logging configuration to prevent disk exhaustion
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  nginx-proxy:
    <<: *default-logging
    image: nginx:alpine
    container_name: CircleSfera-Proxy
    ports:
      - "8082:80"
    environment:
      - FRONTEND_PORT=80
      - BACKEND_PORT=3000
    volumes:
      # TLS terminates on the VPS host nginx (certs generated/renewed on the host).
      # This container only serves HTTP on the published port (e.g. 8082→80).
      - ./nginx/master.conf.template:/etc/nginx/templates/default.conf.template:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - circlesfera-network

  postgres:
    <<: *default-logging
    image: pgvector/pgvector:pg16
    container_name: CircleSfera-Postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circlesfera-network

  redis:
    <<: *default-logging
    image: redis:7-alpine
    container_name: CircleSfera-Redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.production}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - circlesfera-network

  backend:
    <<: *default-logging
    image: ${REGISTRY:-ghcr.io/circlesfera/circlesfera}/backend:latest
    container_name: CircleSfera-Backend
    env_file:
      - path: ./.env.production
        required: false
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # DATABASE_URL mapped via postgres credentials
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    volumes:
      - uploads_data:/app/circlesfera-backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - circlesfera-network

  frontend:
    <<: *default-logging
    image: ${REGISTRY:-ghcr.io/circlesfera/circlesfera}/frontend:latest
    container_name: CircleSfera-Frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - circlesfera-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  circlesfera-network:
    driver: bridge
